<!DOCTYPE html>
<html>
<head>
    <title>Student Results</title>
    <style>
        table, tr, td { 
            border-style: solid; 
            border-width: 1px; 
            border-left-width: 1px; 
            border-right-width: 1px; 
            border-color: black;
        }
    </style>
</head>
<body>

    <p><a href="/dashboard">Back to Dashboard</a></p>
    
    <h1>Results for {{ student["student_first_name"] }} {{ student["student_last_name"] }}</h1>

    {% if message %}
    <p>{{ message }}</p>
    {% endif %}

    <table>
        <tr>
            <td>Quiz ID</td>
            <td>Score</td>
        </tr>

        {% for result in results %}
        <tr>
            <td>{{ result["quiz_id"] }}</td>
            <td>{{ result["quiz_score"] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
