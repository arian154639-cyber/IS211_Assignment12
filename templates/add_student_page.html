<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
</head>
<body>

    <h1>Add Student</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}
    
    <form action="/student/add" method="post">
        <input type="text" name="student_first_name" placeholder="first name"></input>
        <input type="text" name="student_last_name" placeholder="last name"></input>

        <input type="submit" value="Add Student"></input>
    </form>
</body>
</html>
